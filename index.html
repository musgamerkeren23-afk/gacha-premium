<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H4ll0 w0rld Hub Gacha</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #050505;
    color: white;
    text-align: center;
}

/* Container */
.container {
    margin-top: 100px;
}

/* Button */
button {
    padding: 15px 30px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ff0000, #990000);
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255,0,0,0.4);
}

/* Result */
.result {
    margin-top: 30px;
    font-size: 22px;
}

/* Premium effect */
.premium {
    color: gold;
    text-shadow: 0 0 20px gold;
}

/* Zonk */
.zonk {
    color: red;
}
</style>
</head>

<body>

<div class="container">
    <h1>🩸 Gacha System 🩸</h1>

    <button onclick="roll()">ROLL</button>

    <div class="result" id="result"></div>

    <button id="claimBtn" style="display:none;" onclick="claimReward()">
        Claim Reward
    </button>
</div>

<script>
// LOAD SAVE
let unlocked = localStorage.getItem("allKeyUnlocked");

// GACHA FUNCTION
function roll() {
    let resultText = document.getElementById("result");
    let claimBtn = document.getElementById("claimBtn");

    claimBtn.style.display = "none";
    resultText.innerHTML = "Rolling...";

    setTimeout(() => {
        let chance = Math.random();

        if (chance < 0.001) {
            // PREMIUM
            resultText.innerHTML = "💎 PREMIUM!!! ALL KEY UNLOCKED";
            resultText.className = "result premium";

            localStorage.setItem("allKeyUnlocked", "true");

            claimBtn.style.display = "inline-block";
        } else {
            // ZONK
            resultText.innerHTML = "💀 ZONK...";
            resultText.className = "result zonk";
        }
    }, 1500);
}

// CLAIM REWARD → REDIRECT
function claimReward() {
    window.location.href = "https://lootdest.org/s?a0leYAg7";
}

// AUTO CHECK (kalau udah pernah dapet premium)
if (unlocked === "true") {
    document.getElementById("result").innerHTML = "💎 ALREADY UNLOCKED";
    document.getElementById("claimBtn").style.display = "inline-block";
}
</script>

</body>
</html>
